# Lefthook configuration
# https://github.com/evilmartians/lefthook

pre-commit:
  parallel: true
  jobs:
    - name: oxlint
      glob: "*.{js,ts,jsx,tsx,mjs,cjs}"
      run: bun oxlint --fix {staged_files}
      stage_fixed: true
    - name: oxfmt
      run: bun oxfmt --write {staged_files}
      stage_fixed: true

pre-push:
  parallel: true
  jobs:
    - name: test
      run: bun run test
    - name: check-types
      run: bun run check-types
