# Lefthook configuration
# https://github.com/evilmartians/lefthook

pre-commit:
  parallel: true
  jobs:
    - name: oxlint
      glob: "*.{js,ts,jsx,tsx,mjs,cjs}"
      run: bun oxlint --fix {staged_files}
      stage_fixed: true
    - name: oxfmt
      run: bun oxfmt --write {staged_files}
      stage_fixed: true

pre-push:
  parallel: true
  jobs:
    - name: test
      run: find . \( -name "*.test.ts" -o -name "*.test.tsx" -o -name "*.spec.ts" -o -name "*.spec.tsx" \) -not -path "*/node_modules/*" | grep -q . && bun test || echo "No test files found, skipping"
    - name: check-types
      run: bun run check-types
